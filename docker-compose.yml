version: '3.8'

services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always

  backend:
    build: .
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: password
      DB_NAME: mydatabase
    depends_on:
      - db
      - redis

volumes:
  db_data: